; Train_Tracker - JC3248W535C
; Prochains départs d'une gare via API PRIM Île-de-France Mobilités

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I${PROJECT_DIR}/include
    ; --- TLS 1.3 via wolfSSL (API PRIM en TLS 1.3 only depuis 26/05/2026) ---
    ; voir sketches/common/libs/ESP32-EasyWolfSSL/PATCHES.md
    -DWOLFSSL_USER_SETTINGS
    -DWOLFSSL_TLS13
    -DHAVE_SNI
    -Wl,--allow-multiple-definition

lib_deps =
    lvgl/lvgl@^8.3.11
    bblanchon/ArduinoJson@^7.0.0
    wolfssl/Arduino-wolfSSL

; Copie patchee de ESP32-EasyWolfSSL (methode TLS flexible + SNI) ; lib_ignore
; ecarte le paquet generique wolfssl/wolfssl (conflit ESPIDF/ARDUINO).
lib_extra_dirs = /home/pascal/github/arduino/sketches/common/libs
lib_ignore = wolfssl
